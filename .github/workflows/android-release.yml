name: 🚀 Build Release APK (Signed)

on:
  # Déclencher uniquement manuellement pour les releases
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (ex: 1.0.0)'
        required: true
        default: '1.0.0'
  
  # Ou sur tag de version
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: 🏗️ Build Release APK
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'
        cache: gradle
    
    - name: 🔐 Grant execute permission
      run: chmod +x gradlew
    
    - name: 📦 Cache Gradle
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    # Configuration du keystore pour signature (si vous avez un keystore)
    # Décommentez ces lignes si vous configurez un keystore dans les secrets GitHub
    # - name: 🔑 Decode Keystore
    #   run: |
    #     echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks
    
    # - name: ✍️ Create key.properties
    #   run: |
    #     echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> key.properties
    #     echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> key.properties
    #     echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> key.properties
    #     echo "storeFile=keystore.jks" >> key.properties
    
    - name: 🧹 Clean project
      run: ./gradlew clean
    
    - name: 🔨 Build Release APK
      run: ./gradlew assembleRelease
    
    - name: 📝 Rename APK
      run: |
        cd app/build/outputs/apk/release
        VERSION="${{ github.event.inputs.version || '1.0.0' }}"
        mv app-release-unsigned.apk DorkGenerator-v${VERSION}-release.apk
        ls -lh
    
    - name: 📤 Upload Release APK
      uses: actions/upload-artifact@v3
      with:
        name: dork-generator-release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 90
    
    - name: 🎉 Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.event.inputs.version || '1.0.0' }}
        name: Dork Generator v${{ github.event.inputs.version || '1.0.0' }}
        body: |
          # 🎉 Dork Generator - Version ${{ github.event.inputs.version || '1.0.0' }}
          
          ## 📱 Installation
          
          1. **Téléchargez** l'APK ci-dessous
          2. **Activez** "Installation depuis sources inconnues" :
             - Paramètres → Sécurité → Sources inconnues
          3. **Installez** l'APK sur votre appareil Android
          
          ## ✨ Fonctionnalités
          
          - ✅ **8 catégories** de dorks (fichiers, vulnérabilités, infos publiques, etc.)
          - ✅ **42 templates** prédéfinis prêts à l'emploi
          - ✅ **5 moteurs** de recherche (Google, Bing, DuckDuckGo, Yandex, Baidu)
          - ✅ **Historique** complet avec recherche
          - ✅ **Favoris** pour sauvegarder vos dorks
          - ✅ **Export JSON** de vos données
          - ✅ **Material Design 3** avec thème clair/sombre
          - ✅ **Base de données locale** persistante
          
          ## 🔧 Compatibilité
          
          - **Android minimum** : 7.0 (Nougat / API 24)
          - **Android cible** : 14 (API 34)
          - **Taille** : ~5-10 MB
          
          ## ⚠️ Avertissement
          
          Cette application est destinée à un **usage éducatif et de recherche légitime uniquement**.
          Respectez les lois en vigueur et la vie privée d'autrui.
          
          ## 📊 Informations de build
          
          - **Version** : ${{ github.event.inputs.version || '1.0.0' }}
          - **Date** : ${{ github.event.head_commit.timestamp }}
          - **Commit** : ${{ github.sha }}
          
          ---
          
          Développé avec ❤️ en Kotlin & Jetpack Compose
        files: app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 📊 Build Summary
      run: |
        echo "### 🚀 Release Build réussi ! 🎉" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📦 **APK de production généré**" >> $GITHUB_STEP_SUMMARY
        echo "- Version: ${{ github.event.inputs.version || '1.0.0' }}" >> $GITHUB_STEP_SUMMARY
        echo "- Taille: $(du -h app/build/outputs/apk/release/*.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
        echo "- Type: Release APK" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Release créée avec succès**" >> $GITHUB_STEP_SUMMARY
